<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>

body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        input {
            padding: 12px;
            font-size: 18px;
            width: 320px;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
        }

        #date{font-size: 12px;}
        button {
            padding: 12px 30px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

        <div class="container">
        
        <!-- Live Date & Time -->
        <div class="datetime">
            <div class="time" id="currentTime"></div>
            <div class="date" id="currentDate"></div>
        </div>

        <h1>Basic Numeracy Quiz</h1>
        ...

    <h4>Date / time</h4>
    <div class="clock" id = "date"></div>
    <div class="time" id = "time"></div>
    <div id="welcomeMessage">Welcome</div>
    <div class="clock" id="date"></div>
    <div class = "clock" id="time"></div>
    <br><br>

    <div class="container">
        <h1>Choose a quiz</h1>
        
        <div class="buttons">
            <button id="numeracy" onclick="goToPage('numeracy.html')">Basic Numeracy</button>
            <button id="literacy" onclick="goToPage('literacy.html')">Basic Literacy</button>

            <button id="health" onclick = "goToPage('health.html')">Health and Wellbeing</button>
            <button id="history" onclick = "goToPage('history.html')">Scottish history</button>

            <button id="social" onclick = "goToPage('social.html')">Social Awareness</button>
        </div>
    </div>

    <button onclick="changeName()">Go back</button>
    

    <script>
        const username = localStorage.getItem('username');
        
        if (username) {
            document.getElementById('welcomeMessage').innerHTML = 
                `Welcome <strong>${username}</strong>`;
        } else {
            document.getElementById('welcomeMessage').innerHTML = `Welcome Guest!`;
        }

        function changeName() {
            window.location.href = 'index.html';
        }

        
        function goToPage(page) {
            window.location.href = page;
        }
        

        function updateClock() {
            const now = new Date();

            // Format Time (HH:MM:SS)
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            // Add leading zero
            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            const timeString = `${hours}:${minutes}:${seconds}`;
            
            // Format Date
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const dateString = now.toLocaleDateString(undefined, options);

            // Update HTML
            document.getElementById('time').textContent = timeString;
            document.getElementById('date').textContent = dateString;
        }

        // Update every second
        setInterval(updateClock, 1000);

        // Initial call
        updateClock();

    
    </script>
</body>
</html>
