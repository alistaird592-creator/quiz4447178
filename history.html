<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scottish History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #9C27B0;
            margin-bottom: 30px;
        }
        .question {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .question:last-child {
            border-bottom: none;
        }
        .question-number {
            font-weight: bold;
            color: #9C27B0;
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin: 12px 0;
            font-size: 18px;
            cursor: pointer;
        }
        input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        button {
            display: block;
            margin: 40px auto 0;
            padding: 15px 40px;
            font-size: 20px;
            background: #9C27B0;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        button:hover {
            background: #7B1FA2;
        }
        #result {
            margin-top: 30px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>


    <div class="container">
    
        <!-- User Greeting -->
        <div class="greeting" id="userGreeting"></div>
    
        
        ...

    <div class="container">
        <h1>Scottish History Quiz</h1>
        <p style="text-align: center; color: #666;">Test your knowledge of Scotland</p>

        <form id="quizForm">
            
            <!-- Question 1 -->
            <div class="question">
                <div class="question-number">1. What is the capital city of Scotland?</div>
                <label><input type="radio" name="q1" value="glasgow"> Glasgow</label>
                <label><input type="radio" name="q1" value="edinburgh"> Edinburgh</label>
            </div>

            <!-- Question 2 -->
            <div class="question">
                <div class="question-number">2. Who won the Battle of Bannockburn in 1314?</div>
                <label><input type="radio" name="q2" value="wallace"> William Wallace</label>
                <label><input type="radio" name="q2" value="bruce"> Robert the Bruce</label>
            </div>

            <!-- Question 3 -->
            <div class="question">
                <div class="question-number">3. What is Scotland’s national animal?</div>
                <label><input type="radio" name="q3" value="lion"> Lion</label>
                <label><input type="radio" name="q3" value="unicorn"> Unicorn</label>
            </div>

            <!-- Question 4 -->
            <div class="question">
                <div class="question-number">4. Which famous Scottish inventor invented the telephone?</div>
                <label><input type="radio" name="q4" value="edison"> Thomas Edison</label>
                <label><input type="radio" name="q4" value="bell"> Alexander Graham Bell</label>
            </div>

            <!-- Question 5 -->
            <div class="question">
                <div class="question-number">5. What is the name of Scotland’s most famous poet?</div>
                <label><input type="radio" name="q5" value="shakespeare"> William Shakespeare</label>
                <label><input type="radio" name="q5" value="burns"> Robert Burns</label>
            </div>

            <button type="button" onclick="submitQuiz()">Submit Answers</button>
        </form>

        <div id="result"></div>
    </div>



            
            <!-- GO BACK BUTTON -->
            <br><br>
            <button onclick="goBackToResult()" class="back-button">
                ← Go Back to Welcome Page
            </button>

    <script>
        function submitQuiz() {
            const form = document.getElementById('quizForm');
            let score = 0;

            // Correct answers
            if (form.q1.value === "edinburgh") score++;
            if (form.q2.value === "bruce") score++;
            if (form.q3.value === "unicorn") score++;
            if (form.q4.value === "bell") score++;
            if (form.q5.value === "burns") score++;

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = "block";

            if (score === 5) {
                resultDiv.innerHTML = `🎉 Excellent! You got ${score}/5 correct!`;
                resultDiv.style.color = "#4CAF50";
            } else if (score >= 3) {
                resultDiv.innerHTML = `Well done! You got ${score}/5 correct.`;
                resultDiv.style.color = "#9C27B0";
            } else {
                resultDiv.innerHTML = `You got ${score}/5 correct.<br>Keep learning about Scottish History!`;
                resultDiv.style.color = "#f44336";
            }
        }

        function goBackToResult() {
            window.location.href = 'result.html';
        }

                // Display user's name
                function showUserName() {
            const username = localStorage.getItem('username');
            const greetingDiv = document.getElementById('userGreeting');
            
            if (username) {
                greetingDiv.innerHTML = `👋 Welcome, <span style="color:#4CAF50">${username}</span>!`;
            } else {
                greetingDiv.innerHTML = `👋 Welcome, Guest!`;
            }
        }

        // Call when page loads
        window.onload = showUserName;
    </script>

</body>
</html>
